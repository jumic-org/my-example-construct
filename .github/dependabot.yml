version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
        versions: ['>=25.0.0']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
        versions: ['>=6.0.0']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
