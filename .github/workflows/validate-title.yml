name: Validate title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
  merge_group:

jobs:
  validate:
    name: Validate semantic format
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate semantic format
        if: ${{ github.event_name != 'merge_group' }}
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
